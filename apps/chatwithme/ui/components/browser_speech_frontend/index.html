<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser Speech</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: transparent;
      }

      .wrapper {
        display: grid;
        gap: 0.75rem;
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
      }

      button {
        border: 1px solid rgba(128, 128, 128, 0.35);
        border-radius: 999px;
        padding: 0.55rem 0.9rem;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.08);
        color: inherit;
        font: inherit;
      }

      button[disabled] {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .status {
        font-size: 0.92rem;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="row" id="controls"></div>
      <div class="status" id="status">Loading browser speech support…</div>
    </div>
    <script>
      const Streamlit = {
        send(type, payload = {}) {
          window.parent.postMessage(
            {
              isStreamlitMessage: true,
              type,
              ...payload,
            },
            "*"
          )
        },
        setFrameHeight(height) {
          Streamlit.send("streamlit:setFrameHeight", { height })
        },
        setComponentValue(value) {
          Streamlit.send("streamlit:setComponentValue", { value })
        },
        ready() {
          Streamlit.send("streamlit:componentReady", { apiVersion: 1 })
        },
      }

      const controlsEl = document.getElementById("controls")
      const statusEl = document.getElementById("status")
      const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition
      const supportsRecognition = Boolean(Recognition)
      const supportsSynthesis = Boolean(window.speechSynthesis && window.SpeechSynthesisUtterance)

      let recognition = null
      let isListening = false
      let currentArgs = {}
      let lastSpokenText = ""
      let lastPayloadSignature = ""

      function emit(payload) {
        const value = {
          eventId: payload.eventId || "",
          transcript: payload.transcript || "",
          status: payload.status || "",
          supportsRecognition,
          supportsSynthesis,
          error: payload.error || "",
        }
        const signature = JSON.stringify(value)
        if (signature === lastPayloadSignature) {
          return
        }
        lastPayloadSignature = signature
        Streamlit.setComponentValue(value)
      }

      function updateStatus(text) {
        statusEl.textContent = text
        Streamlit.setFrameHeight(document.body.scrollHeight)
      }

      function createButton(label, onClick, disabled = false) {
        const button = document.createElement("button")
        button.type = "button"
        button.textContent = label
        button.disabled = disabled
        button.addEventListener("click", onClick)
        return button
      }

      function stopRecognition() {
        if (recognition && isListening) {
          recognition.stop()
        }
        isListening = false
        render()
      }

      function startRecognition() {
        if (!supportsRecognition) {
          emit({
            status: "Recognition unavailable",
            error: "This browser does not support speech recognition.",
          })
          updateStatus("Speech recognition is unavailable in this browser.")
          return
        }

        if (!recognition) {
          recognition = new Recognition()
          recognition.lang = "en-US"
          recognition.interimResults = false
          recognition.maxAlternatives = 1

          recognition.onstart = () => {
            isListening = true
            updateStatus("Listening…")
            render()
          }

          recognition.onend = () => {
            isListening = false
            if (!statusEl.textContent.startsWith("Transcript ready")) {
              updateStatus("Recognition stopped.")
            }
            render()
          }

          recognition.onerror = (event) => {
            isListening = false
            const message = event.error || "Speech recognition failed."
            emit({
              status: "Recognition error",
              error: message,
            })
            updateStatus(`Recognition error: ${message}`)
            render()
          }

          recognition.onresult = (event) => {
            const transcript = Array.from(event.results)
              .map((result) => result[0]?.transcript || "")
              .join(" ")
              .trim()

            emit({
              eventId: String(Date.now()),
              transcript,
              status: "Transcript ready",
            })
            updateStatus(transcript ? `Transcript ready: ${transcript}` : "No speech detected.")
          }
        }

        recognition.start()
      }

      function speakText(text) {
        if (!supportsSynthesis || !text) {
          return
        }

        const normalizedText = text.trim()
        if (!normalizedText || normalizedText === lastSpokenText) {
          return
        }

        window.speechSynthesis.cancel()
        const utterance = new SpeechSynthesisUtterance(normalizedText)
        utterance.onstart = () => updateStatus("Speaking response…")
        utterance.onend = () => updateStatus("Playback finished.")
        utterance.onerror = () => updateStatus("Speech synthesis failed.")
        window.speechSynthesis.speak(utterance)
        lastSpokenText = normalizedText
      }

      function render() {
        controlsEl.innerHTML = ""

        if (currentArgs.enable_transcription) {
          const startButton = createButton(
            isListening ? "Listening…" : "Start browser transcription",
            startRecognition,
            Boolean(currentArgs.disabled) || isListening
          )
          const stopButton = createButton(
            "Stop listening",
            stopRecognition,
            Boolean(currentArgs.disabled) || !isListening
          )
          controlsEl.appendChild(startButton)
          controlsEl.appendChild(stopButton)
        }

        if (currentArgs.auto_speak && !supportsSynthesis) {
          updateStatus("Speech synthesis is unavailable in this browser.")
        }

        Streamlit.setFrameHeight(document.body.scrollHeight)
      }

      window.addEventListener("message", (event) => {
        if (event.data.type !== "streamlit:render") {
          return
        }

        currentArgs = event.data.args || {}
        render()

        if (!supportsRecognition && currentArgs.enable_transcription) {
          emit({
            status: "Recognition unavailable",
            error: "This browser does not support speech recognition.",
          })
        }

        if (currentArgs.auto_speak) {
          speakText(currentArgs.speak_text || "")
        }
      })

      Streamlit.ready()
      emit({ status: "Ready" })
      updateStatus("Browser speech controls ready.")
      render()
    </script>
  </body>
</html>
