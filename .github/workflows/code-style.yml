name: Code Style

on: [push, pull_request]

jobs:
  python-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Check Python formatting
        run: |
          ruff format --check \
            apps/api \
            apps/headless-client \
            apps/simulator \
            research

  web-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Prettier
        run: npm install --no-save prettier
      - name: Check JS/TS formatting
        run: |
          npx prettier --check \
            ".github/**/*.{yml,yaml}" \
            "*.json" \
            "*.md" \
            "apps/web/src/**/*.{js,jsx,ts,tsx,scss,css,json}" \
            "apps/web/*.json"
