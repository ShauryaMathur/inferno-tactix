services:
  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      API_BASE_URL: http://localhost:6969
      WS_URL: ws://localhost:8765
      GENERATED_ASSETS_BASE_URL: /generated
      DANGEROUSLY_DISABLE_HOST_CHECK: "true"
    volumes:
      - ../../data/generated:/data/generated
    depends_on:
      - api
      - simulator

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "6969:6969"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: "6969"
      API_SPAWN_SIMULATOR: "false"
      GENERATED_TERRAIN_DIR: /app/data/generated/terrain
      API_MODELS_DIR: /app/apps/api/models
      EE_SERVICE_ACCOUNT_FILE: /app/apps/api/config/ee-service-account.json
    volumes:
      - ../../data:/app/data

  simulator:
    build:
      context: ../..
      dockerfile: apps/simulator/Dockerfile
    ports:
      - "8765:8765"
    environment:
      WEBSOCKET_HOST: 0.0.0.0
      WEBSOCKET_PORT: "8765"
      MODEL_DIR: /app/data/models/simulator
      ANALYTICS_DIR: /app/data/analytics/simulator
      SIMULATOR_RUNS_DIR: /app/data/runs/simulator/ppo_firefighter
    volumes:
      - ../../data:/app/data

  headless-client:
    build:
      context: ../..
      dockerfile: apps/headless-client/Dockerfile
    environment:
      REACT_APP_URL: http://web:8080
      SCREENSHOT_DIR: /app/screenshots
      LOG_LEVEL: INFO
    volumes:
      - ../../data/screenshots:/app/screenshots
    depends_on:
      - web
      - simulator
